    <style>
        :root {
            --yellow: #fcee0a;
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --bg-dark: #0a0a0c;
            --bg-panel: #101014;
            --border: rgba(252,238,10,0.15);
            --text: #e8e6df;
            --text-dim: #6a6a72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* 背景层 - 城市网格地面透视 */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 60%;
            background: 
                linear-gradient(90deg, transparent 49.5%, rgba(252,238,10,0.04) 49.5%, rgba(252,238,10,0.04) 50.5%, transparent 50.5%),
                linear-gradient(0deg, rgba(252,238,10,0.06) 0%, transparent 40%);
            background-size: 80px 80px, 100% 100%;
            transform: perspective(400px) rotateX(60deg);
            transform-origin: bottom;
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(0,240,255,0.02) 0%, transparent 100%);
        }

        /* 顶部警告条 */
        .warning-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: repeating-linear-gradient(90deg, var(--yellow) 0px, var(--yellow) 20px, transparent 20px, transparent 30px);
            z-index: 100;
            opacity: 0.8;
        }

        /* 故障闪烁 */
        .glitch-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--cyan);
            opacity: 0;
            z-index: 99;
            animation: glitchScan 8s linear infinite;
        }

        @keyframes glitchScan {
            0%, 100% { top: -2px; opacity: 0; }
            5% { opacity: 0.6; }
            10% { top: 100%; opacity: 0; }
        }

        /* 容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 60px 20px 40px;
        }

        /* 头部面板 */
        .id-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
            animation: panelIn 0.5s ease 0.1s both;
        }

        .id-card::before {
            content: 'ID VERIFIED';
            position: absolute;
            top: 8px;
            right: 24px;
            font-size: 9px;
            font-family: 'Orbitron', monospace;
            color: var(--cyan);
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .id-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            border-style: solid;
            border-width: 0 16px 16px 0;
            border-color: transparent var(--yellow) transparent transparent;
            opacity: 0.3;
        }

        .id-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 2px;
            object-fit: cover;
            border: 2px solid var(--yellow);
            filter: saturate(0.8);
            transition: filter 0.3s;
        }

        .avatar:hover { filter: saturate(1.2) brightness(1.1); }

        .id-info h1 {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 900;
            color: var(--yellow);
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .id-info .role {
            font-size: 12px;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .id-info .desc {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.4;
        }

        /* 分区标签 */
        .section-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--yellow);
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.7;
            animation: panelIn 0.5s ease 0.3s both;
        }

        .section-tag::before {
            content: '';
            width: 12px;
            height: 1px;
            background: var(--yellow);
        }

        /* 链接列表 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: panelIn 0.5s ease 0.4s both;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-panel);
            border: 1px solid transparent;
            border-left: 2px solid transparent;
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s ease;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
        }

        .link:hover {
            border-color: var(--border);
            border-left-color: var(--yellow);
            background: rgba(252,238,10,0.03);
        }

        .link:hover .link-name {
            color: var(--yellow);
        }

        .link:active {
            transform: scale(0.99);
        }

        .link-icon {
            width: 28px;
            height: 28px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon img { width: 16px; height: 16px; object-fit: contain; }

        .link-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s;
        }

        .link-handle {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* 图标色 */
        .ic-dy { background: linear-gradient(135deg, #25f4ee, #fe2c55); }
        .ic-tt { background: #fff; }
        .ic-tt svg { fill: #000 !important; }
        .ic-ks { background: #ff5e26; }
        .ic-yt { background: #ff0000; }
        .ic-bl { background: #00a1d6; }
        .ic-ig { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); }
        .ic-x { background: #fff; }
        .ic-x svg { fill: #000 !important; }
        .ic-gh { background: #fff; }
        .ic-gh svg { fill: #000 !important; }
        .ic-qq { background: #12b7f5; }
        .ic-em { background: var(--magenta); }

        /* 底部 */
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid rgba(252,238,10,0.08);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: 'Orbitron', monospace;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: panelIn 0.5s ease 0.6s both;
        }

        .footer .ver { color: var(--cyan); opacity: 0.5; }

        /* 动画 */
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container { padding: 48px 14px 32px; }
            .id-info h1 { font-size: 15px; }
            .id-card { padding: 18px; }
        }
    </style>
