    <style>
        :root {
            --neon: #00ff88;
            --neon-dim: rgba(0,255,136,0.1);
            --neon-glow: rgba(0,255,136,0.4);
            --bg: #050508;
            --surface: #0d0d12;
            --border: rgba(0,255,136,0.15);
            --text: #e0e0e0;
            --text-dim: #5a5a6a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', 'Noto Sans SC', monospace;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* 扫描线效果 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* 网格背景 */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* 光束 */
        .beam {
            position: fixed;
            top: 0;
            left: 30%;
            width: 1px;
            height: 100vh;
            background: linear-gradient(180deg, var(--neon), transparent 60%);
            opacity: 0.08;
            z-index: 0;
        }
        .beam:nth-child(2) { left: 70%; opacity: 0.05; }

        /* 容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            opacity: 0;
            animation: glitchIn 0.6s ease 0.1s forwards;
        }

        .status-bar .online {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--neon);
        }

        .status-bar .online::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon-glow);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 头像区域 */
        .hero {
            text-align: center;
            margin-bottom: 48px;
            opacity: 0;
            animation: glitchIn 0.6s ease 0.2s forwards;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 1px solid var(--neon);
            border-radius: 50%;
            opacity: 0.5;
            animation: spin 12s linear infinite;
            clip-path: polygon(0 0, 60% 0, 60% 100%, 0 100%);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            filter: grayscale(30%);
            transition: filter 0.3s;
        }

        .avatar:hover { filter: grayscale(0%) drop-shadow(0 0 12px var(--neon-glow)); }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 3px;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon-glow), 0 0 60px rgba(0,255,136,0.1);
            margin-bottom: 8px;
        }

        .hero .subtitle {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .hero .bio {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.7;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* 链接区域 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 6px;
            opacity: 0;
            animation: glitchIn 0.6s ease 0.4s forwards;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            transition: all 0.15s ease;
            position: relative;
        }

        .link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--neon);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .link:hover {
            border-color: var(--border);
            background: rgba(0,255,136,0.03);
            padding-left: 20px;
        }

        .link:hover::before { opacity: 1; }

        .link:active { transform: scale(0.99); }

        .link-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .link-icon img { width: 16px; height: 16px; object-fit: contain; }

        .link-name {
            flex: 1;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-handle {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* 图标颜色 */
        .ic-dy { background: linear-gradient(135deg, #25f4ee, #fe2c55); }
        .ic-tt { background: #fff; }
        .ic-tt svg { fill: #000 !important; }
        .ic-ks { background: #ff5e26; }
        .ic-yt { background: #ff0000; }
        .ic-bl { background: #00a1d6; }
        .ic-ig { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); }
        .ic-x { background: #fff; }
        .ic-x svg { fill: #000 !important; }
        .ic-gh { background: #fff; }
        .ic-gh svg { fill: #000 !important; }
        .ic-qq { background: #12b7f5; }
        .ic-em { background: #ea4335; }

        /* 底部 */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: glitchIn 0.6s ease 0.6s forwards;
        }

        .footer span {
            color: var(--neon);
        }

        /* 入场动画 */
        @keyframes glitchIn {
            0% { opacity: 0; transform: translateY(8px); filter: blur(4px); }
            60% { filter: blur(0); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .container { padding: 40px 16px; }
            .hero h1 { font-size: 34px; }
        }
